<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Catalog</title>
    <style>
        body {
            background-color: #97c39b; /* Soft green */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            width: 1000px;
            height: 600px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 20px;
        }
        .left-panel {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .right-panel {
            width: 60%;
            background-color: #F0F5E4;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2 {
            color: #345E35; /* Dark green */
            text-align: center;
        }
        input[type="text"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .plant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            width: 100%;
            max-height: 450px;
            overflow-y: auto;
            padding: 10px;
            display: none; /* Initially hidden */
        }
        .plant-item {
            text-align: center;
            cursor: pointer;
        }
        .plant-item img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
        }
        .plant-item p {
            margin-top: 5px;
            font-weight: bold;
            color: #345E35;
        }
        .details {
            text-align: center;
            display: none;
        }
        .details img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }
        .details h3 {
            color: #345E35;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h2>Plant Catalog</h2>
        <input type="text" id="search" placeholder="Search plants...">
        <div class="plant-grid" id="plantList">
            <div class="plant-item" onclick="showDetails('Tomato', 'Tomato description.', 'https://via.placeholder.com/200')">
                <img src="https://via.placeholder.com/100">
                <p>Tomato</p>
            </div>
            <div class="plant-item" onclick="showDetails('Carrot', 'Tasty carrot', 'https://via.placeholder.com/200')">
                <img src="https://via.placeholder.com/100">
                <p>Carrot</p>
            </div>
            <div class="plant-item" onclick="showDetails('Potato', 'tasty potato i guess', 'https://via.placeholder.com/200')">
                <img src="https://via.placeholder.com/100">
                <p>Potato</p>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <h2>Plant Details</h2>
        <div class="details" id="details">
            <img id="plantImg" src="" alt="Plant Image">
            <h3 id="plantName"></h3>
            <p id="plantDescription"></p>
        </div>
    </div>
</div>

<script>
    function showDetails(name, description, imgSrc) {
        document.getElementById('plantName').innerText = name;
        document.getElementById('plantDescription').innerText = description;
        document.getElementById('plantImg').src = imgSrc;
        document.getElementById('details').style.display = 'block';
    }

    document.getElementById('search').addEventListener('input', function() {
        let filter = this.value.toLowerCase();
        let plantGrid = document.getElementById('plantList');
        let items = document.querySelectorAll('.plant-item');
        let hasResults = false;

        items.forEach(item => {
            let text = item.innerText.toLowerCase();
            if (text.includes(filter) && filter !== "") {
                item.style.display = 'block';
                hasResults = true;
            } else {
                item.style.display = 'none';
            }
        });

        // Show or hide the plant grid based on search results
        plantGrid.style.display = hasResults ? 'grid' : 'none';
    });
</script>

</body>
</html>

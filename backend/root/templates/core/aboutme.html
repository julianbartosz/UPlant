<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        body {
            background-color: #97c39b; /* Soft green */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            width: 700px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h2 {
            color: #345E35; /* Dark green */
            margin-bottom: 15px;
        }
        p {
            color: #333;
            line-height: 1.6;
        }
        .team-section {
            margin-top: 20px;
        }
        .team-members {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .team-member {
            text-align: center;
            max-width: 150px;
        }
        .team-member img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
        }
        .team-member p {
            margin-top: 8px;
            font-weight: bold;
            color: #345E35;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>About Us</h2>
    <p>At U-Plant, we are dedicated to [mission or goal]</p>
    
    <div class="team-section">
        <h3>Meet Our Team</h3>
        <div class="team-members">
            <div class="team-member">
                <img src="">
                <p>Lebron James</p>
            </div>
            <div class="team-member">
                <img src="">
                <p>Barack Obama</p>
            </div>
            <div class="team-member">
                <img src="">
                <p>Very cool guy</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
